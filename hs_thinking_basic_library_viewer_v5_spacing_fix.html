{const t=document.getElementById("securityToast");if(!t)return;t.classList.add("show");clearTimeout(showSecurityToast.timer);showSecurityToast.timer=setTimeout(()=>t.classList.remove("show"),1600)}function installSecurityGuards(){document.addEventListener("contextmenu",e=>{e.preventDefault();showSecurityToast()});document.addEventListener("copy",e=>{e.preventDefault();showSecurityToast()});document.addEventListener("cut",e=>{e.preventDefault();showSecurityToast()});document.addEventListener("dragstart",e=>e.preventDefault());document.addEventListener("keydown",e=>{const k=String(e.key||"").toLowerCase();const blocked=k==="f12"||e.ctrlKey&&k==="u"||e.ctrlKey&&k==="s"||e.ctrlKey&&e.shiftKey&&["i","j","c"].includes(k);if(blocked){e.preventDefault();e.stopPropagation();showSecurityToast()}},true)}function toEmbedUrl(url){try{const p=new URL(url);let id="";if(p.hostname.includes("youtu.be"))id=p.pathname.split("/").filter(Boolean)[0]||"";else if(p.hostname.includes("youtube.com")){if(p.pathname.startsWith("/embed/"))id=p.pathname.split("/").filter(Boolean)[1]||"";else if(p.pathname.startsWith("/shorts/"))id=p.pathname.split("/").filter(Boolean)[1]||"";else if(p.pathname.startsWith("/live/"))id=p.pathname.split("/").filter(Boolean)[1]||"";else id=p.searchParams.get("v")||""}id=id.replace(/[^a-zA-Z0-9_-]/g,"");let start=p.searchParams.get("t")||p.searchParams.get("start")||"",sec=0;if(/^\d+$/.test(start))sec=Number(start);else{const m=String(start).match(/(?:(\d+)h)?(?:(\d+)m)?(?:(\d+)s)?/i);if(m)sec=Number(m[1]||0)*3600+Number(m[2]||0)*60+Number(m[3]||0)}const origin=location.origin&&location.origin!=="null"?"&origin="+encodeURIComponent(location.origin):"";return id?"https://www.youtube.com/embed/"+id+"?rel=0&modestbranding=1&playsinline=1"+(sec?"&start="+sec:"")+origin:url}catch(e){return url}}function makeButton(key,extra){const item=LESSONS[key],btn=document.createElement("button");btn.className="lesson-button "+(extra||"");btn.type="button";btn.dataset.lesson=key;btn.textContent=item.label;btn.addEventListener("click",()=>selectLesson(key,true));return btn}function buildAppShell(){if(document.getElementById("studentApp"))return;const app=document.createElement("div");app.id="studentApp";app.innerHTML=`<header class="premium-header no-print"><div class="header-grid"><div class="brand-cluster"><img class="brand-logo" src="Library/gfield-logo.png" alt="G-FIELD 지필드 영재교육 로고"><span class="consult-pill">상담 안내</span></div><div class="hero-copy"><div class="slogan">성공하는 공부 습관을 만드는 지필드 영재교육</div><div class="subline">더 높은 레벨을 위한 <b>THINKING BASIC</b> <span class="student-name" id="headerStudentName">학생</span>만을 위한 프리미엄 개념 강의</div></div><div class="header-actions"><button class="top-button" type="button" onclick="window.print()">인쇄하기</button><button id="cinemaToggleTop" class="top-button primary" type="button">큰 화면으로 보기</button></div></div></header><main class="viewer-main no-print"><nav class="viewer-menu" id="lessonMenu" aria-label="THINKING BASIC 강의 메뉴"></nav><section class="study-shell"><section class="video-pane"><div class="panel-head"><div><div class="panel-title" id="videoPanelTitle">문제푸는 방법 찾기(1) · 개념</div><div class="panel-meta" id="videoPanelMeta">교재 1쪽으로 자동 이동</div></div><button id="openYouTube" class="top-button" type="button">유튜브 직접 보기</button></div><div class="video-frame-box"><iframe id="lessonVideoFrame" title="G-FIELD 개념 강의" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe></div><div class="video-caption"><b>학습 순서:</b> 먼저 영상을 보고, 오른쪽 교재의 해당 쪽을 바로 풀어 보세요. 인쇄 시에는 버튼과 영상 영역이 사라지고 교재와 이름 워터마크만 출력됩니다.<div class="video-help"><span>일부 공개 영상도 학원/학교망에서 YouTube 접속이 막히면 내장 재생이 안 됩니다. 이때는 오른쪽 버튼으로 직접 열어 주세요.</span><button id="openYouTubeHelp" class="youtube-direct" type="button">유튜브에서 직접 보기</button></div></div></section><section id="bookPane" class="book-pane" aria-label="THINKING BASIC 교재 영역"><div styl
